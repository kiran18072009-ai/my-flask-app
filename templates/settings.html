<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"><meta name="view port " content="width=device-width,initial-scale=1.0">
        <title>
            Settings
        </title>
        <style>
            body {
                display: flex;
                font-style: italic;
                justify-content: center;
                align-items: center;
                
                height: 100vh;
                margin: 0;
                background-color: #75deeac4;
                font-family: Arial, sans-serif;
            }
             h1 {
                background-color: rgb(255, 255, 255);
                padding: 100px;
                border-radius: 100px; 
                border-color: rgb(5, 209, 255);
                border-style: dashed;
                text-align: center;

               
                display: flex;
                box-shadow: 4px 25px 10px rgba(0, 0, 0, 0.1);
                gap: 20px;
                font-style: italic;
                color: rgb(2, 68, 77);

             }
             a {
                padding: auto;
                border-radius:10px ;
                box-shadow: 4px 2px 10px rgba(0, 0, 0, 0.1);
                background-color: aqua;
             }
             .adjust {position: absolute; right: 0px;  bottom: 0px;}
             .logout-link {position: absolute; left: 10px; top: 10px;}
             .dashboard {position: absolute; right: 9.9px;top: 10px;}

             
        </style>
    </head>
<body>
    <h1>Settings page</h1>
    <p class="adjust">Adjust your preference here</p>
    <a href="/logout" class="logout-link">Logout</a>
    <a href="/dashboard/<name>" class="dashboard">dashboard</a>
</body>

</html>
