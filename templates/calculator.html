
    <!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {background-color: rgb(117, 232, 232);}
        .calc-box { width: 250px; margin: 50px auto; text-align: center; border: 1px solid #ccc; padding: 10px; }
        #display { width: 90%; height: 40px; margin-bottom: 10px; font-size: 20px; text-align: right; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { height: 40px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="calc-box">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="append('/')">/</button>
            <button onclick="append('*')">×</button>
            <button onclick="backspace()">«</button>
            
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('-')">-</button>
            
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('+')">+</button>
            
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="calculate()">=</button>
            
            <button onclick="append('0')" style="grid-column: span 2;">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="window.location.href='/dashboard'">Back</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        function append(val) { display.value += val; }
        function clearDisplay() { display.value = ''; }
        function backspace() { display.value = display.value.slice(0, -1); }
        function calculate() {
            try { display.value = eval(display.value); } 
            catch { display.value = 'Error'; }
        }
    </script>
    <a href="/logout">Logout</a>
</body>
</html>
</body>
</html>
