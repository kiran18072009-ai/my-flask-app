<!DOCTYPE html>
<html>
<head>
    <title>Kiran's Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        .container {
            background: white;
            width: 80%;
            margin: 30px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .form-box {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 150px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        .log-box {
            margin-top: 20px;
            text-align: left;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f8f9fa;
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .badge {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>

</head>

<body>

<h1>{{name}}'s Study Dashboard</h1>

<div class="container">

    <div class="form-box">
        <form method="POST">
            <input type="text" name="subject" placeholder="Subject" required>
            <input type="number" name="hours" placeholder="Hours" required>
            <button type="submit">Add</button>
        </form>
    </div>

    <hr>

    <div class="log-box">
        <h2>📊 Study Log</h2>

<ul>
    {% for item in data %}
        <li>
            {{item.subject}} - {{item.hours}} hrs

            <a href="/done/{{item.id}}">
                <button class="done-btn">Done</button>
            </a>
        </li>
    {% endfor %}
</ul>
    </div>
<a href="/logout">logout</a>






<div class="footer">
    Made by Kiran 🚀
</div>

</body>
</html>
