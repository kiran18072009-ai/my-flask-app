<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background-color: #b6edf3;
                font-family: Arial, sans-serif;
            }
            form {
                background-color: rgb(232, 242, 242);
                padding: 200px;
                border-radius: 100px;
                box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-direction: column;
                gap: 0.0002px;

                
            }
            .create-text {
                text-align: center;
                font-size: 14px;
                margin-top: 15px;
                color: #333;

            }
            button {
                padding: 8px;
                border-radius: 6px;
                border: none;
                background-color: #4cafaa;
                color: white;
                cursor: pointer;
            }
            button:hover {background-color: #457aa0;}
            .create-link {text-decoration: none; color: #007BFF; font-weight: 600;}
            .create-link:hover {text-decoration: underline;}
            .t-and-c {position: absolute; right: 10px; bottom: 10px;}
        </style>
    </head>
<body>
    <h1>Login Page</h1>


    <form method="POST">
        <h2 style="font-style: italic;">Login to explore>></h2>
        <p>Username:</p>
        <input type="text" name="username" placeholder="Enter your name" required><br>
        <p>Password:</p>
        <input type="password" name="password" placeholder="Enter password" required><br>
        <button type="submit">Login</button>
        
    </form>
    >

<p class="create-text">
    Don't have an account?
    <a href="/create_account" class="create-link">Create one</a>
</p>
<a href="/terms" class="t-and-c">terms and conditions</a>
</body>
</html>
