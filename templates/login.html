<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background-color: #b6edf3;
                font-family: Arial, sans-serif;
            }
            form {
                background-color: rgb(232, 242, 242);
                padding: 200px;
                border-radius: 100px;
                box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-direction: column;
                gap: 0.0002px;

                
            }
            
            .t-and-c {position: absolute; right: 10px; bottom: 10px;}
        </style>
    </head>
<body>
    <h1>Login Page</h1>


    <form method="POST">
        <h2 style="font-style: italic;">Login to explore>></h2>
        <p>Username:</p>
        <input type="text" name="username" placeholder="Enter your name" required><br>
        <p>Password:</p>
        <input type="password" name="password" placeholder="Enter password" required><br>
        <button type="submit">Login</button>
    </form>
<a href="/terms" class="t-and-c">terms and conditions</a>
</body>
</html>
