<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url("{{ url_for('static', filename='background.avif')}}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            


        }

        /* Container to hold both text and button */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-calc {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            transition: background 0.3s;
        }

        

        h1 {
            background-color: rgb(255, 255, 255);
            padding: 100px;
            border-radius: 100px;
            border-color: rgb(5, 209, 255);
            border-style: groove;
            display: inline-block;
            box-shadow: 4px 5px 10px rgba(0, 0, 0, 0.1);
            font-style: italic;
            color: rgb(2, 68, 77);
            text-decoration: underline;
            margin: 0; /* Removed margin to keep spacing tight */
        }

        a {
            background-color: rgb(213, 224, 239);
            padding: 8px;
            border: 3px;
            border-color: #f4f4f4;
            box-shadow: 4px 5px 10px rgba(0, 0, 0, 0.1);
            gap: 0px;
            border-radius: 10px;
        }
        .btn-calc:hover {
            background-color: #0056b3;
        }
        .button-group {
            display: flex;       /* Aligns items in a row */
            gap: 20px;          /* Adds space between the buttons */
            justify-content: center; 
            margin-top: 20px;   /* Pulls them slightly away from the welcome box */
        }

        .logout-link { position: absolute; right: 10px; top: 10px; }
        .settings-link { position: absolute; left: 10px; top: 10px; }
        .tand-c {position: absolute; right: 10px; bottom: 10px;}
    </style>
</head>
<body>
    <a href="/logout" class="logout-link">logout</a>
    <a href="/settings" class="settings-link">Settings</a>
    <a href="/t&c" class="tand-c">terms and conditions</a>



    
    

    <div class="welcome-container">
    <h1>Hello {{ name }}, Welcome 🎉</h1>

    <div class="button-group">
        <a href="/dashboard2" class="btn-calc">Study Mode</a>
        <a href="{{ url_for('calculator') }}" class="btn-calc">Open Calculator</a>
    </div>
    </div>
   
</body>
</html>
