<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 1;
                background-color: #75deeac4;
                font-family: Arial, sans-serif;
            }
            h1 {
                background-color: rgb(255, 255, 255);
                padding: 100px;
                border-radius: 100px; 
                border-color: rgb(5, 209, 255);
                border-style: dashed;

               
                display: flex;
                box-shadow: 4px 50px 10px rgba(0, 0, 0, 0.1);
                gap: 20px;
                font-style: italic;
                color: rgb(2, 68, 77);

            }
            a {
                background-color: rgb(55, 213, 241);
                padding: 8px;
                border: 3px;
                
                border-color: #f4f4f4;
                box-shadow: 4px 5px 10px rgba(0, 0, 0, 0.1);
                gap: 0px;
                border-radius: 10px;

            }

            
            
        </style>
    </head>
<body>

<h1>Hello {{name}} , Welcome 🎉</h1>
<a href="/logout">Logout</a>
<a href="/settings">Settings</a>

</body>
</html>
